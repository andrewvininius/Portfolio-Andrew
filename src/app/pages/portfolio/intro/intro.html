
<header class="header">

  <nav class="navbar glass">
    <h1 class="logo">Portfólio</h1>

    <!-- BOTÃO HAMBURGUER -->
    <button
      class="menu-btn"
      [class.active]="isOpen()"
      (click)="toggleMenu()"
      aria-label="Abrir menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- MENU DESKTOP -->
    <ul class="menu">
      <li><a href="#inicio">Início</a></li>
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#Habilidades">Habilidades</a></li>
      <li><a href="#Educação">Educação</a></li>
      <li><a href="#Projetos">Projetos</a></li>
      <li><a href="#Contato">Contato</a></li>
    </ul>

    <!-- TOGGLE DESKTOP -->
   <div class="btn-glass-toggle desktop-toggle">
      <input type="checkbox" />
      <label class="toggle">
        <span>PT</span>
        <span>EN</span>
        <div class="slider"></div>
      </label>
    </div>
  </nav>

  <!-- BACKDROP -->
  <div
    class="backdrop"
    [class.active]="isOpen()"
    (click)="closeMenu()"
  ></div>

  <!-- MENU LATERAL -->
  <aside class="drawer" [class.active]="isOpen()">

    <button class="close-btn" (click)="closeMenu()">✕</button>

    <ul>
      <li><a (click)="closeMenu()" href="#inicio">Início</a></li>
      <li><a (click)="closeMenu()" href="#sobre">Sobre</a></li>
      <li><a (click)="closeMenu()" href="#Habilidades">Habilidades</a></li>
      <li><a (click)="closeMenu()" href="#Educação">Educação</a></li>
      <li><a (click)="closeMenu()" href="#Projetos">Projetos</a></li>
      <li><a (click)="closeMenu()" href="#Contato">Contato</a></li>
    </ul>

    <!-- TOGGLE MOBILE -->
    <div class="btn-glass-toggle mobile-toggle">
      <input type="checkbox" />
      <label class="toggle">
        <span>PT</span>
        <span>EN</span>
        <div class="slider"></div>
      </label>
    </div>

  </aside>

  <section class="hero">
    <div class="glass-card">

      <h1 class="title">
        Olá, eu sou <span>Andrew</span>
      </h1>

      <p class="subtitle">
        Desenvolvo interfaces modernas e integradas com APIs usando Angular
      </p>

      <div class="buttons">
        <a href="#projetos" class="button-primary">
          Ver projetos
        </a>

        <a href="#contato" class="button-secondary">
          Entrar em contato
        </a>
      </div>

    </div>

    <a href="#sobre" class="scroll-down">
      <i class="bi bi-arrow-down-short"></i>
    </a>
  </section>

</header>
